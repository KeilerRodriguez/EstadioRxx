<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Estadio Atletico AR</title>

    <!-- A-Frame y AR.js desde CDN (sin instalar nada) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      #loading {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 16px;
      }
      #loading h2 { margin: 0; font-size: 20px; }
      #loading p  { margin: 0; font-size: 14px; opacity: 0.7; text-align: center; padding: 0 24px; }
      .spinner {
        width: 40px; height: 40px;
        border: 4px solid rgba(255,255,255,0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Barra de controles inferior */
      #controls {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(0,0,0,0.65);
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 10px 8px 16px;
        z-index: 100;
        gap: 6px;
      }
      .btn {
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        color: #fff;
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
        text-align: center;
        min-width: 55px;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active { background: rgba(255,255,255,0.35); }
      .btn.active { background: rgba(100,200,100,0.4); border-color: #6fc; }

      #hint {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: #fff;
        padding: 8px 18px;
        border-radius: 20px;
        font-size: 12px;
        z-index: 100;
        pointer-events: none;
        text-align: center;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>

    <div id="loading">
      <div class="spinner"></div>
      <h2>Estadio Atletico AR</h2>
      <p>Apunta la camara al marcador Hiro para ver el estadio en 3D</p>
    </div>

    <div id="hint">Apunta al marcador Hiro impreso</div>

    <!-- Controles táctiles -->
    <div id="controls">
      <div class="btn" id="btn-reset"    onclick="resetModel()">&#8635; Reset</div>
      <div class="btn active" id="btn-rotate" onclick="setMode('rotate')">&#8635; Rotar</div>
      <div class="btn" id="btn-move"     onclick="setMode('move')">&#8689; Mover</div>
      <div class="btn" id="btn-zoom-in"  onclick="zoomStep(1.2)">+ Zoom</div>
      <div class="btn" id="btn-zoom-out" onclick="zoomStep(0.8)">&#8722; Zoom</div>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam;
            detectionMode: mono_and_matrix;
            matrixCodeType: 3x3;
            debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true"
      loading-screen="dotsColor: white; backgroundColor: black">

      <a-assets>
        <a-asset-item id="estadio-model" src="Estadio_Atletico.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro" id="marker">
        <!-- pivot: controla posición (mover) -->
        <a-entity id="pivot">
          <!-- estadio: controla rotación y escala -->
          <a-entity
            id="estadio"
            gltf-model="#estadio-model"
            scale="0.02 0.02 0.02"
            position="0 0 0"
            rotation="-90 0 0">
          </a-entity>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>

    </a-scene>

    <script>
      // ── Estado ────────────────────────────────────────────────
      let mode         = 'rotate';
      let currentScale = 0.02;
      let rotX = -90, rotY = 0;
      let posX = 0,   posZ = 0;

      const estadio = document.getElementById('estadio');
      const pivot   = document.getElementById('pivot');

      // ── Cambiar modo ──────────────────────────────────────────
      function setMode(m) {
        mode = m;
        document.getElementById('btn-rotate').classList.toggle('active', m === 'rotate');
        document.getElementById('btn-move').classList.toggle('active',   m === 'move');
        document.getElementById('hint').textContent =
          m === 'rotate' ? 'Arrastra 1 dedo para rotar' : 'Arrastra 1 dedo para mover';
      }

      // ── Zoom por botones ──────────────────────────────────────
      function zoomStep(factor) {
        currentScale = Math.min(Math.max(currentScale * factor, 0.002), 0.3);
        applyTransform();
      }

      // ── Reset ─────────────────────────────────────────────────
      function resetModel() {
        currentScale = 0.02;
        rotX = -90; rotY = 0;
        posX = 0;   posZ = 0;
        applyTransform();
        document.getElementById('hint').textContent = 'Apunta al marcador Hiro impreso';
      }

      // ── Aplicar transformación ────────────────────────────────
      function applyTransform() {
        estadio.setAttribute('scale',    `${currentScale} ${currentScale} ${currentScale}`);
        estadio.setAttribute('rotation', `${rotX} ${rotY} 0`);
        pivot.setAttribute('position',   `${posX} 0 ${posZ}`);
      }

      // ── Gestos táctiles ───────────────────────────────────────
      let lastTouch = null;
      let lastDist  = null;

      document.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1)
          lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        if (e.touches.length === 2)
          lastDist = getTouchDist(e.touches);
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        // Dos dedos → zoom pinch
        if (e.touches.length === 2 && lastDist !== null) {
          const dist   = getTouchDist(e.touches);
          currentScale = Math.min(Math.max(currentScale * (dist / lastDist), 0.002), 0.3);
          applyTransform();
          lastDist  = dist;
          lastTouch = null;
          return;
        }
        // Un dedo → rotar o mover
        if (e.touches.length === 1 && lastTouch) {
          const dx = e.touches[0].clientX - lastTouch.x;
          const dy = e.touches[0].clientY - lastTouch.y;
          if (mode === 'rotate') {
            rotY += dx * 0.5;
            rotX  = Math.min(Math.max(rotX + dy * 0.5, -180), 0);
          } else {
            const s = 0.01 / currentScale;
            posX += dx * s * 0.02;
            posZ += dy * s * 0.02;
          }
          applyTransform();
          lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
      }, { passive: true });

      document.addEventListener('touchend', () => {
        lastTouch = null; lastDist = null;
      }, { passive: true });

      function getTouchDist(t) {
        const dx = t[0].clientX - t[1].clientX;
        const dy = t[0].clientY - t[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }

      // ── Ocultar loading ───────────────────────────────────────
      document.querySelector('a-scene').addEventListener('loaded', () => {
        document.getElementById('loading').style.display = 'none';
      });
    </script>
  </body>
</html>
