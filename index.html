<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Estadio Atletico AR</title>

    <!-- A-Frame y AR.js desde CDN (sin instalar nada) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      /* Pantalla de carga */
      #loading {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 16px;
      }
      #loading h2 { margin: 0; font-size: 20px; }
      #loading p  { margin: 0; font-size: 14px; opacity: 0.7; text-align: center; padding: 0 24px; }
      .spinner {
        width: 40px; height: 40px;
        border: 4px solid rgba(255,255,255,0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Instrucción flotante */
      #hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: #fff;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 13px;
        z-index: 100;
        pointer-events: none;
        text-align: center;
      }
    </style>
  </head>
  <body>

    <!-- Pantalla de carga inicial -->
    <div id="loading">
      <div class="spinner"></div>
      <h2>Estadio Atletico AR</h2>
      <p>Apunta la camara al marcador Hiro para ver el estadio en 3D</p>
    </div>

    <!-- Instruccion permanente -->
    <div id="hint">Apunta al marcador Hiro impreso</div>

    <!--
      ╔══════════════════════════════════════════════════════╗
      ║  A-FRAME + AR.js SCENE                               ║
      ║  sourceType: webcam  →  usa la camara del celular    ║
      ║  detectionMode: mono + matrix  →  detecta Hiro       ║
      ╚══════════════════════════════════════════════════════╝
    -->
    <a-scene
      embedded
      arjs="sourceType: webcam;
            detectionMode: mono_and_matrix;
            matrixCodeType: 3x3;
            debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true"
      loading-screen="dotsColor: white; backgroundColor: black">

      <!-- Activos: carga el modelo .glb exportado desde Unity -->
      <a-assets>
        <a-asset-item id="estadio-model" src="Estadio_Atletico.glb"></a-asset-item>
      </a-assets>

      <!--
        MARCADOR HIRO (imprime la imagen hiro_marker.png que se incluye)
        El modelo aparece encima de ese marcador cuando la camara lo detecta.

        Ajusta la escala según el tamaño real de tu modelo:
          scale="0.01 0.01 0.01"  →  modelos muy grandes de Unity (en metros)
          scale="0.05 0.05 0.05"  →  modelos medianos

        position="0 0 0"  →  centrado sobre el marcador
        rotation="-90 0 0" →  Unity exporta con eje Y arriba; AR.js usa Z arriba
      -->
      <a-marker preset="hiro">
        <a-entity
          gltf-model="#estadio-model"
          scale="0.02 0.02 0.02"
          position="0 0 0"
          rotation="-90 0 0"
          animation="property: rotation;
                     to: -90 360 0;
                     loop: false;
                     dur: 0;
                     startEvents: model-loaded">
        </a-entity>
      </a-marker>

      <!-- Camara AR -->
      <a-entity camera></a-entity>

    </a-scene>

    <script>
      // Ocultar pantalla de carga cuando la escena AR esté lista
      document.querySelector('a-scene').addEventListener('loaded', () => {
        document.getElementById('loading').style.display = 'none';
      });
    </script>
  </body>
</html>
